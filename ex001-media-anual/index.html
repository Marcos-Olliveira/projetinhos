<!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>media anual</title>
    </head>
    <body>

        <style>
            body{
                margin:auto;
                text-align: center;            
            }
            
            h1{
                margin-top:100px;
                color:rgba(179, 40, 5, 0.822);
                font-size:50px;
            }

            h3{
                margin-top:50px;
                margin-bottom:40px;
                font-weight: 500;

            }
            #input{
                width:fit-content;
                border: solid 1px rgb(189, 185, 185);
                text-align: center;
                font-size: 15px;
                margin:auto;
            }           

            #nota1,#nota2,
            #nota3,#nota4{
            border:none;
            width:60px;
            height:40px;
            align-items: center;
            }


            /*retirar o foco azul que fica ao redor da o input selecionado*/
            #nota1,#nota2,
            #nota3,#nota4
            :focus{
                outline: none;
            }
            

            button{
                height: 50px;;
                font-size:15px;
                width:100px;
                margin-left:10px;

            }

            
        </style>
    </head>
    <body>

        <!--crio uma entrada do usuário permitindo que o mesmo digite apenas números-->
        <h1>Calculadora da média anual</h1>
        <h3>Apenas números devem ser digitados, sem espaço e separados por vírgula</h3>

         <div id="input">  
            <input type="text" id="nota1">
            <input type="text" id="nota2">
            <input type="text" id="nota3">
            <input type="text" id="nota4">

            <button id="button">Tirar média</button>
        </div>

        <script>

        
        let botao =document.getElementById("button")


        botao.addEventListener("click", ()=>{
            let nota1 = document.getElementById("nota1").value
            let nota2 = document.getElementById("nota2").value
            let nota3 = document.getElementById("nota3").value
            let nota4 = document.getElementById("nota4").value

           console.log(typeof(nota1))
           console.log(typeof(nota2))
           console.log(typeof(nota3))
           console.log(typeof(nota4))



            
            
        })

        
        </script>
    </body>
        
    </body>
</html>
